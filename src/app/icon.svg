  <line x1="26" y1="26" x2="12" y2="4" stroke="#c5a84a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Club heads -->
  <path d="M5 26.5 Q4 27.5 5.5 28 Q7 27.5 6.5 26" fill="#c5a84a"/>
  <path d="M27 26.5 Q28 27.5 26.5 28 Q25 27.5 25.5 26" fill="#c5a84a"/>

  <!-- Crown base band -->
  <rect x="8" y="16" width="16" height="3" rx="0.5" fill="#c5a84a"/>
  <!-- Crown arches -->
  <path d="M8 16 Q8 11 11 11 Q12.5 11 13 13 Q13.5 11 16 10 Q18.5 11 19 13 Q19.5 11 21 11 Q24 11 24 16" fill="#c5a84a"/>
  <!-- Crown top orb -->
  <circle cx="16" cy="9.5" r="1.5" fill="#c5a84a"/>
  <line x1="16" y1="8" x2="16" y2="10.5" stroke="#1a3a1a" stroke-width="0.6"/>
  <line x1="14.8" y1="9.5" x2="17.2" y2="9.5" stroke="#1a3a1a" stroke-width="0.6"/>
  <!-- Crown jewel dots -->
  <circle cx="11" cy="14" r="1" fill="#1a3a1a"/>
  <circle cx="16" cy="13.5" r="1" fill="#1a3a1a"/>
  <circle cx="21" cy="14" r="1" fill="#1a3a1a"/>
  <!-- Crown base dots -->
  <circle cx="12" cy="17.5" r="0.7" fill="#1a3a1a"/>
  <circle cx="16" cy="17.5" r="0.7" fill="#1a3a1a"/>
  <circle cx="20" cy="17.5" r="0.7" fill="#1a3a1a"/>

  <!-- Velvet cap interior lines -->
  <path d="M9.5 15.5 Q11 12.5 13 13.5" fill="none" stroke="#1a3a1a" stroke-width="0.4"/>
  <path d="M15 13 Q16 11.5 17 13" fill="none" stroke="#1a3a1a" stroke-width="0.4"/>
  <path d="M19 13.5 Q21 12.5 22.5 15.5" fill="none" stroke="#1a3a1a" stroke-width="0.4"/>

  <!-- 1881 text -->
  <text x="16" y="24.5" text-anchor="middle" fill="#c5a84a" font-family="serif" font-size="4" font-weight="bold" letter-spacing="0.5">1881</text>
